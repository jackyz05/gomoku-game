<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku Game - 五子棋</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>五子棋 Gomoku</h1>

        <div class="game-info">
            <div class="current-player">
                当前玩家: <span id="currentPlayer">黑子</span>
            </div>
            <div class="game-status" id="gameStatus">游戏进行中</div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button id="restartBtn" class="btn">重新开始</button>
            <button id="undoBtn" class="btn">悔棋</button>
        </div>

        <div class="instructions">
            <h3>游戏规则：</h3>
            <ul>
                <li>黑子先行，白子后行</li>
                <li>率先连成5个棋子的一方获胜</li>
                <li>可以横向、纵向或对角线连成5子</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
